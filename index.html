<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Birthday Terminal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="container">
    <div class="terminal-container">
        <div class="terminal-header">
            <span>SSH Terminal</span>
            <span class="badge bg-secondary">User: ******</span>
        </div>

        <div id="terminal" class="terminal-window"></div>

        <div class="input-line">
            <span class="prompt">&gt;</span>
            <input id="commandInput" type="text" placeholder="Tape une commande...">
        </div>

        <div class="mt-3">
            <span class="badge badge-info">INFO</span>
            <span class="ms-2">Utilise <code>help</code> pour voir les commandes disponibles.</span><br>

            <span class="badge badge-hint mt-2">HINT</span>
            <span class="ms-2">Résous les puzzles pour débloquer le message final.</span>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="js/terminal.js"></script>

</body>
</html>
